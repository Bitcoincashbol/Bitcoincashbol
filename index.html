<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .bg-custom-dark { background-color: #0b1120; }
        .card-custom { background-color: #111827; border: 1px solid #1f2937; }
        .btn-gold { background-color: #e5d399; color: #111827; }
        .btn-menu { background-color: #1f2937; color: white; border: 1px solid #374151; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Login -->
    <div id="login-form" class="w-full max-w-sm p-6 bg-custom-dark rounded-3xl">
        <img src="1781111677225.png" class="w-24 mx-auto mb-6">
        <input type="text" id="tel" class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white" placeholder="Celular">
        <input type="password" id="pass" class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white" placeholder="Contraseña">
        <button onclick="login()" class="w-full p-4 rounded-xl btn-gold font-bold">Ingresar</button>
    </div>

    <!-- Menú Principal (Oculto al inicio) -->
    <div id="menu-principal" class="w-full max-w-md p-8 bg-custom-dark rounded-[30px] hidden" style="display:none;">
        <h1 class="text-white font-bold mb-4" id="nombreUsuario">Hola, </h1>
        <div class="card-custom rounded-[24px] p-6 mb-8">
            <p class="text-gray-400 text-sm">Balance Actual (1 USD = 6.96 BOB)</p>
            <h2 class="text-white text-4xl font-bold" id="usdDisplay">$0.00 USD</h2>
            <p class="text-emerald-400 font-bold" id="bobDisplay">Bs.0.00 BOB</p>
        </div>
        <div class="space-y-4">
            <button class="w-full btn-gold py-4 rounded-2xl font-bold">➕ Agregar Fondos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">➖ Retirar Fondos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">📊 Ver Gráficos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">🎧 Atención al Cliente</button>
            <button onclick="location.reload()" class="text-gray-500 w-full mt-4">Cerrar Sesión</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
