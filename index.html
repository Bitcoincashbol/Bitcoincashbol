<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-custom { background-color: #111827; border: 1px solid #1f2937; border-radius: 20px; }
        .btn-gold { background-color: #e5d399; color: #111827; font-weight: bold; }
        .btn-menu { background-color: #1f2937; color: white; border: 1px solid #374151; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Login -->
    <div id="login-form" class="w-full max-w-sm p-8 card-custom text-center">
        <img src="1781111677225.png" class="w-32 mx-auto mb-6">
        <input type="text" id="tel" class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white border border-gray-700" placeholder="Celular">
        <input type="password" id="pass" class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white border border-gray-700" placeholder="Contraseña">
        <button onclick="login()" class="w-full p-4 rounded-xl btn-gold">Ingresar</button>
        <p onclick="showRegister()" class="mt-4 text-gray-400 cursor-pointer text-sm underline">¿No tienes cuenta? Regístrate aquí</p>
    </div>

    <!-- Registro -->
    <div id="register-form" class="w-full max-w-sm p-8 card-custom hidden">
        <h2 class="text-xl font-bold mb-4 text-center">Crear Cuenta</h2>
        <input type="text" id="reg-nombre" class="w-full p-3 mb-3 rounded-xl bg-gray-800" placeholder="Nombre">
        <input type="text" id="reg-apellido" class="w-full p-3 mb-3 rounded-xl bg-gray-800" placeholder="Apellidos">
        <input type="text" id="reg-tel" class="w-full p-3 mb-3 rounded-xl bg-gray-800" placeholder="Celular">
        <input type="password" id="reg-pass" class="w-full p-3 mb-4 rounded-xl bg-gray-800" placeholder="Contraseña">
        <button onclick="register()" class="w-full p-4 rounded-xl btn-gold">Registrarse</button>
        <p onclick="location.reload()" class="mt-4 text-center text-sm underline cursor-pointer">Volver al Login</p>
    </div>

    <!-- Menú -->
    <div id="menu-principal" class="w-full max-w-md p-8 card-custom hidden">
        <h1 class="text-white font-bold mb-4" id="nombreUsuario">Hola</h1>
        <div class="card-custom p-6 mb-8 border-none bg-gray-800">
            <p class="text-gray-400 text-sm">Balance Actual</p>
            <h2 class="text-white text-3xl font-bold" id="usdDisplay">$0.00 USD</h2>
            <p class="text-emerald-400 font-bold" id="bobDisplay">Bs.0.00 BOB</p>
        </div>
        <div class="space-y-4">
            <button class="w-full btn-gold py-4 rounded-2xl">➕ Agregar Fondos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">➖ Retirar Fondos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">📊 Ver Gráficos</button>
            <button class="w-full btn-menu py-4 rounded-2xl">🎧 Atención al Cliente</button>
            <button onclick="location.reload()" class="text-gray-500 w-full mt-4 text-sm">Cerrar Sesión</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
