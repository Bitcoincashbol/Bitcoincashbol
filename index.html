<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bitcoin Cash Bol</title>
</head>
<body>
    <div id="app">
        <div id="login-form" class="card">
            <img src="1781111677225.png" class="logo">
            <h1>Bitcoin Cash Bol</h1>
            <input type="text" id="tel" placeholder="Número de celular">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="login()" class="btn-primary">Ingresar</button>
            <p onclick="showRegister()" class="link-text">¿No tienes cuenta? Regístrate aquí</p>
        </div>

        <div id="register-form" class="card" style="display:none;">
            <img src="1781111677225.png" class="logo">
            <h2>Registro</h2>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="text" id="reg-apellido" placeholder="Apellidos">
            <input type="text" id="reg-tel" placeholder="Celular">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="register()" class="btn-primary">Registrarse</button>
            <p onclick="location.reload()" class="link-text">Volver al Login</p>
        </div>

        <div id="menu-principal" class="card" style="display:none;">
            <img src="1781111677225.png" class="logo">
            <h1 id="nombreUsuario">Hola</h1>
            <div class="balance-box">
                <p>Balance Actual</p>
                <h2 id="usdDisplay">$0.00 USD</h2>
                <p id="bobDisplay" class="text-bob">Bs.0.00 BOB</p>
            </div>
            <div class="grid-menu">
                <button onclick="abrirAgregarSaldo()">Agregar Saldo</button>
                <button>Retirar Fondos</button>
                <button>Ver Gráficos</button>
                <button>Ayuda</button>
            </div>
            <button onclick="location.reload()" class="btn-secondary">Cerrar Sesión</button>
        </div>

        <div id="agregar-saldo" class="card" style="display:none;">
    <img src="1781111677225.png" class="logo">
    <h2>AGREGAR FONDOS</h2>
    <p>Escanea el QR y realiza tu deposito</p>
    <div class="qr-container">
        <!-- Aquí va tu imagen QR real -->
        <img src="qr_bitcoin.jpg" alt="QR Bitcoin" class="qr-code">
    </div>
    <button onclick="regresarAlMenu()" class="btn-secondary">← Volver al Menú</button>
                                        </div>
            <button class="btn-primary" style="margin-top:15px;">RED BITCOIN (BTC)</button>
            <button onclick="regresarAlMenu()" class="btn-secondary">← Volver al Menú</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
