<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Bitcoin Cash Bol</title>
</head>
<body>
    <div class="container" id="login-form">
        <h1>Bitcoin Cash Bol</h1>
        <input type="text" id="tel" placeholder="Número de celular">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <p>¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate aquí</a></p>
    </div>

    <div class="container" id="register-form" style="display:none;">
        <h2>Registro</h2>
        <input type="text" id="reg-nombre" placeholder="Nombre">
        <input type="text" id="reg-apellido" placeholder="Apellidos">
        <input type="text" id="reg-tel" placeholder="Número de celular">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <button onclick="register()">Registrarse</button>
        <p><a href="#" onclick="location.reload()">Volver al Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
